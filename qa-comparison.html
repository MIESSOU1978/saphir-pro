<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparaison ergonomique de l'accueil</title>
<style>
  *{box-sizing:border-box;}
  body{margin:0;padding:24px;background:#050b14;color:#edf4ff;font-family:Ebrima,"Segoe UI",Arial,sans-serif;}
  h1{margin:0 0 20px;font-size:22px;}
  .comparison{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;}
  figure{margin:0;padding:14px;border:1px solid rgba(96,165,250,.35);background:#081524;border-radius:8px;}
  figcaption{margin-bottom:10px;color:#60a5fa;font-size:13px;font-weight:800;text-transform:uppercase;}
  img{display:block;width:100%;height:520px;object-fit:contain;object-position:top center;background:#02060c;border-radius:6px;}
</style>
</head>
<body>
  <h1>Accueil CALCMO Pro : avant / après</h1>
  <div class="comparison">
    <figure>
      <figcaption>Avant : hauteur forcée et grand vide</figcaption>
      <img src="qa-home-before.png" alt="Accueil avant correction">
    </figure>
    <figure>
      <figcaption>Après : hauteur naturelle et action rapprochée</figcaption>
      <img src="qa-home-after.png" alt="Accueil après correction">
    </figure>
  </div>
</body>
</html>

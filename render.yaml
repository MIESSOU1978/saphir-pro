services:
  - type: web
    name: saphir-pro
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python web_entry.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: TURSO_URL
        value: "libsql://saphir-pro-miessou1978.aws-ap-northeast-1.turso.io"
      - key: TURSO_TOKEN
        sync: false
      - key: APP_PASSWORD
        sync: false
